      function showSeekStatus(state, message) {
        const el = document.getElementById("seek-status");
        el.classList.add("show");
        el.classList.toggle("ready", state === "ready");
        el.classList.toggle("failed", state === "failed");
        el.querySelector(".seek-status-msg").textContent = message;
      }

      function hideSeekStatus() {
        const el = document.getElementById("seek-status");
        el.classList.remove("show", "ready", "failed");
      }

      function mergeSeekResults(lexical, vectorHits, limit) {
        const rows = new Map();
        lexical.forEach((r, i) => {
          rows.set(r.slug, {
            ...r,
            combined: 1 / (60 + i + 1),
            reason: r.reason || "text match",
            source: "text",
          });
        });
        vectorHits.forEach((hit, i) => {
          const page = searchIndex.pages[hit.pageId];
          if (!page) return;
          const base = searchIndex.resultForPage(page, hit.score, hit.heading ? "meaning · " + hit.heading : "meaning", hit.snippet);
          const current = rows.get(base.slug);
          const contribution = 1.35 / (60 + i + 1);
          if (current) {
            current.combined += contribution;
            current.source = "hybrid";
            if (hit.score > (current.vectorScore || 0)) {
              current.vectorScore = hit.score;
              current.reason = base.reason;
              current.snippetHtml = base.snippetHtml || current.snippetHtml;
            }
          } else {
            rows.set(base.slug, {
              ...base,
              combined: contribution,
              source: "meaning",
              vectorScore: hit.score,
            });
          }
        });
        return Array.from(rows.values())
          .sort((a, b) => b.combined - a.combined)
          .slice(0, limit)
          .map((r) => ({ ...r, score: r.vectorScore || r.score || r.combined, chip: r.source === "hybrid" ? "text + meaning" : r.source }));
      }

      function filterNavInPlace(q) {
        buildNav();
        const ql = q.toLowerCase();
        document.querySelectorAll(".nav-link").forEach((el) => {
          const txt = el.textContent.toLowerCase();
          el.style.display = txt.includes(ql) ? "" : "none";
        });
      }

      function renderResults(results, q, scoreLabel) {
        const nav = document.getElementById("nav");
        nav.className = "nav-list";
        if (!results.length) {
          nav.innerHTML = `<div class="results-empty">no matches for <b>${escapeHtml(q)}</b></div>`;
          return;
        }
        let html = `<div class="results-summary">${results.length} result${results.length === 1 ? "" : "s"} · ${scoreLabel}</div><div class="results">`;
        for (const r of results) {
          const sp = spatialSlugs.has(r.slug) ? " spatial" : "";
          const meaning = r.chip === "meaning" || r.chip === "hybrid" || r.chip === "text + meaning" ? " meaning" : "";
          const score = (r.score >= 1 ? r.score.toFixed(2) : (r.score * 100).toFixed(0) + "%");
          const snippet = r.snippetHtml || escapeHtml(r.snippet || "");
          const chip = r.chip ? ` · <span class="r-chip">${escapeHtml(r.chip)}</span>` : "";
          const isFact = r.kind === "fact" && r.factId;
          const action = isFact ? `openFactDetail('${r.factId}')` : `openWikiPage('${r.slug}')`;
          const dataAttr = isFact ? `data-fact-id="${escapeHtml(r.factId)}"` : `data-slug="${escapeHtml(r.slug)}"`;
          html += `<a class="result${sp}${meaning}" ${dataAttr} href="javascript:void(0)" onclick="${action}">
      <div class="r-title">${escapeHtml(r.title)}</div>
      <div class="r-meta"><span>${r.category}${r.subcategory ? " · " + r.subcategory : ""}${r.reason ? " · " + escapeHtml(r.reason) : ""}${chip}</span><span class="score">${score}</span></div>
      <div class="r-snippet">${snippet}</div>
    </a>`;
        }
        html += `</div>`;
        nav.innerHTML = html;
        setActiveNav(currentSlug);
      }

      function formatMw(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return "";
        return `${n.toLocaleString(undefined, { maximumFractionDigits: n >= 100 ? 0 : 2 })} MW`;
      }

      function escapeHtml(s) {
        return String(s).replace(/[<>&"']/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;", "'": "&#39;" }[c]));
      }

      // ============================================================
      // Guided tour (short / deep / expansive)
      // ============================================================
      function tourSteps() {
        if (!tourManifest || !tourState.tourId) return [];
        const t = tourManifest.tours && tourManifest.tours[tourState.tourId];
        return (t && t.steps) || [];
      }

      function clearTourNote() {
        document.querySelectorAll(".tour-note").forEach((el) => el.remove());
      }

      function updateTourToggleButton() {
        const toggle = document.getElementById("tour-mode-toggle");
        const sw = document.getElementById("tour-switch");
        const hint = document.getElementById("tour-toggle-hint");
        if (!toggle || !sw || !hint) return;
        const on = !!tourState.enabled;
        sw.classList.toggle("on", on);
        hint.textContent = on ? "on" : "off";
        toggle.setAttribute("aria-pressed", on ? "true" : "false");
      }

      function applyTourEnabledState() {
        const rail = document.getElementById("tour-rail");
        if (!rail) return;
        rail.classList.toggle("hidden", !tourState.enabled);
        updateTourToggleButton();
        if (!tourState.enabled) {
          tourState.active = false;
          clearTourNote();
        }
        buildTourRail();
        syncUrl();
      }

      function activeTourStep() {
        const steps = tourSteps();
        return steps[tourState.stepIndex] || null;
      }

      function resolveCounterNarratives(step) {
        if (!tourManifest || !Array.isArray(tourManifest.counter_narratives)) return [];
        const all = tourManifest.counter_narratives;
        const ids = step && Array.isArray(step.counter_narratives) ? step.counter_narratives : [];
        const byId = Object.fromEntries(all.map((c) => [c.id, c]));
        return ids.map((id) => byId[id]).filter(Boolean);
      }

      function renderTourNote(step) {
        const page = document.getElementById("page");
        const modeCopy = (step.mode_copy && step.mode_copy[tourState.mode]) || "";
        const q = (step.questions || []).slice(0, 2);
        const ev = step.evidence || {};
        const metrics = (ev.metrics || []).slice(0, 4);
        const sources = (ev.sources || []).slice(0, 5);
        const transition = step.transition_to_next || "";
        const hero = step.hero_moment || "";
        const floorKey = step.floor || "";
        const floorMeta = (tourManifest && tourManifest.floors && tourManifest.floors[floorKey]) || null;
        const floorLabel = floorMeta ? floorMeta.label : "";
        const counters = resolveCounterNarratives(step);
        const note = `<section class="tour-note">
    <div class="tn-kicker">
      <span>${escapeHtml((tourState.mode || "short").toUpperCase())} TOUR</span>
      ${floorLabel ? `<span class="tn-floor">Floor · ${escapeHtml(floorLabel)}</span>` : ""}
    </div>
    <div class="tn-title">${escapeHtml(step.title || step.id || "")}</div>
    ${hero ? `<div class="tn-hero">${escapeHtml(hero)}</div>` : ""}
    <div class="tn-copy">${escapeHtml(modeCopy)}</div>
    ${q.length ? `<div class="tn-q">Key question${q.length > 1 ? "s" : ""}: ${escapeHtml(q.join(" · "))}</div>` : ""}
    <details class="tour-evidence">
      <summary>Evidence</summary>
      <div class="te-body">
        ${metrics.length ? `<div><div class="te-k">Metrics</div><ul class="te-list">${metrics.map((m) => `<li>${escapeHtml(m)}</li>`).join("")}</ul></div>` : ""}
        ${sources.length ? `<div><div class="te-k">Source pages</div><div class="te-v">${sources.map((s) => escapeHtml(s)).join(" · ")}</div></div>` : ""}
        ${ev.confidence ? `<div><div class="te-k">Confidence</div><div class="te-v">${escapeHtml(String(ev.confidence).toUpperCase())}</div></div>` : ""}
      </div>
    </details>
    ${counters.length ? `
    <details class="tour-counters" open>
      <summary>Common claim vs what the data says</summary>
      <div class="tc-body">
        ${counters.map((c) => `
          <div class="tc-item">
            <div class="tc-claim"><span class="tc-k">Claim</span>${escapeHtml(c.claim || "")}</div>
            <div class="tc-reality"><span class="tc-k">Reality</span>${escapeHtml(c.reality || "")}</div>
            ${c.confidence ? `<div class="tc-conf">Confidence · ${escapeHtml(String(c.confidence).toUpperCase())}</div>` : ""}
          </div>
        `).join("")}
      </div>
    </details>` : ""}
    ${transition ? `<div class="tn-next"><b>Next</b>${escapeHtml(transition)}</div>` : ""}
  </section>`;
        if (!page) return;
        page.insertAdjacentHTML("afterbegin", note);
      }

      async function activateTourStep(index, opts = {}) {
        const steps = tourSteps();
        if (!steps.length) return;
        tourState.stepIndex = Math.max(0, Math.min(index, steps.length - 1));
        const step = steps[tourState.stepIndex];
        if (!step) return;

        if (step.preset && presetsCfg.presets[step.preset]) {
          await applyPreset(step.preset, { fly: false });
        }
        for (const key of (step.layers_on || [])) {
          if (!lm.has(key)) await lm.add(key);
        }
        if (step.page) await window.openWikiPage(step.page, { fromTour: true });
        if (step.focus && Array.isArray(step.focus.center)) {
          map.flyTo(step.focus.center, step.focus.zoom || 7, { duration: 0.9 });
        }
        renderTourNote(step);
        buildTourRail();
        if (opts.sync !== false) syncUrl();
      }

      function startTour(tourId, mode, stepId) {
        if (!tourManifest || !tourManifest.tours[tourId]) return;
        tourState.active = true;
        tourState.tourId = tourId;
        tourState.mode = (tourManifest.modes && tourManifest.modes[mode]) ? mode : (tourManifest.default_mode || "short");
        const steps = tourManifest.tours[tourId].steps || [];
        const idx = stepId ? Math.max(0, steps.findIndex((s) => s.id === stepId)) : 0;
        tourState.stepIndex = idx < 0 ? 0 : idx;
        localStorage.setItem("explorer.tour", tourId);
        localStorage.setItem("explorer.tourMode", tourState.mode);
        activateTourStep(tourState.stepIndex);
      }

      function exitTour() {
        tourState.active = false;
        clearTourNote();
        buildTourRail();
        syncUrl();
      }

      function nextTourStep() { activateTourStep(tourState.stepIndex + 1); }
      function prevTourStep() { activateTourStep(tourState.stepIndex - 1); }

      function buildTourRail() {
        const rail = document.getElementById("tour-rail");
        if (!rail || !tourManifest) return;
        if (!tourState.enabled) {
          rail.innerHTML = "";
          return;
        }
        const tours = Object.entries(tourManifest.tours || {});
        if (!tourState.tourId && tours.length) tourState.tourId = tours[0][0];
        const steps = tourSteps();
        const step = activeTourStep();
        const modeBtns = Object.entries(tourManifest.modes || {}).map(([id, meta]) =>
          `<button data-tour-mode="${id}" class="${tourState.mode === id ? "active" : ""}" title="${escapeAttr(meta.description || "")}">${escapeHtml(meta.label || id)}</button>`
        ).join("");
        const isActive = !!tourState.active;
        const atStart = !isActive || tourState.stepIndex === 0;
        const atEnd = !isActive || tourState.stepIndex >= Math.max(steps.length - 1, 0);
        const startLabel = tourState.active ? "Restart" : "Start";
        const nextLabel = tourState.active && atEnd ? "Finish" : "Next";
        const exitLabel = tourState.active ? "Pause" : "Exit";
        rail.innerHTML = `
    <div class="tr-head">
      <div class="tr-title">Guided Tour</div>
      <div style="font-size:11px; color: var(--ink-soft);">${tourState.active ? "active" : "idle"}</div>
    </div>
    <div class="tr-body">
      <div class="tr-row">
        <label>Tour</label>
        <select id="tour-select">
          ${tours.map(([id, t]) => `<option value="${id}" ${tourState.tourId === id ? "selected" : ""}>${escapeHtml(t.title || id)}</option>`).join("")}
        </select>
      </div>
      <div class="tr-row">
        <label>Length</label>
        <div class="tr-seg">${modeBtns}</div>
      </div>
      <div class="tr-row">
        <label>Jump to step</label>
        <select id="tour-step-select">
          ${steps.map((s, i) => `<option value="${i}" ${i === tourState.stepIndex ? "selected" : ""}>${i + 1}. ${escapeHtml(s.title || s.id || ("Step " + (i + 1)))}</option>`).join("")}
        </select>
      </div>
      <div class="tr-step">${step ? `Step ${tourState.stepIndex + 1}/${steps.length} · <b>${escapeHtml(step.title || step.id)}</b>` : "No step selected."}</div>
      <div class="tr-controls">
        <div class="left">
          <button id="tour-prev" ${atStart ? "disabled" : ""}>Prev</button>
          <button id="tour-next" class="primary" ${!isActive ? "disabled" : ""}>${nextLabel}</button>
        </div>
        <div class="right">
          <button id="tour-start">${startLabel}</button>
          <button id="tour-exit" ${!isActive ? "disabled" : ""}>${exitLabel}</button>
        </div>
      </div>
    </div>
  `;
        document.getElementById("tour-select").addEventListener("change", (e) => {
          tourState.tourId = e.target.value;
          localStorage.setItem("explorer.tour", tourState.tourId);
          buildTourRail();
        });
        const stepSelect = document.getElementById("tour-step-select");
        if (stepSelect) {
          stepSelect.addEventListener("change", (e) => {
            const idx = Number(e.target.value);
            if (Number.isFinite(idx)) activateTourStep(idx);
          });
        }
        rail.querySelectorAll("[data-tour-mode]").forEach((b) => b.addEventListener("click", () => {
          tourState.mode = b.dataset.tourMode;
          localStorage.setItem("explorer.tourMode", tourState.mode);
          if (tourState.active) activateTourStep(tourState.stepIndex);
          else buildTourRail();
        }));
        document.getElementById("tour-prev").addEventListener("click", prevTourStep);
        document.getElementById("tour-next").addEventListener("click", () => {
          if (!tourState.active) return;
          if (atEnd) { exitTour(); return; }
          nextTourStep();
        });
        document.getElementById("tour-start").addEventListener("click", () => startTour(tourState.tourId, tourState.mode));
        document.getElementById("tour-exit").addEventListener("click", () => {
          if (!tourState.active) return;
          exitTour();
        });
      }

      // ============================================================
      // Page open + map sync
      // ============================================================
      function setActiveNav(slug) {
        document.querySelectorAll("#nav .nav-link, #nav .result").forEach((el) => {
          el.classList.toggle("active", el.dataset.slug === slug);
        });
        document.getElementById("now-page").textContent = slug || "no page";
      }

      window.openWikiPage = async function (slug, opts = {}) {
        // Detect "re-open the page that's already showing" — typically happens when
        // the user clicks a feature whose canonical page is already loaded. In that
        // case the map view is already adequate (we just opened the bound popup);
        // re-flying the camera would yank the user away from where they clicked.
        const wasAlreadyCurrent = (currentSlug === slug);
        const page = document.getElementById("page");
        page.innerHTML = "<div class='placeholder'>loading…</div>";
        const html = await window.NepalExplorer.renderPage(slug, { spatialSlugs });
        // Treat the "No page for **X**" sentinel from wiki-loader as a failure —
        // don't claim the slug as current, otherwise bound popups render
        // "✓ Showing in reader" while the reader itself says nothing was found.
        // The sentinel is wrapped in `<div class="placeholder">No page for ... </div>`.
        const loadFailed = /class="placeholder">(No page for |Could not load )/.test(html);
        page.innerHTML = html;
        if (loadFailed) {
          document.getElementById("map-info").innerHTML =
            "<b>" + slug + "</b><br/>Wiki page not found. The map binding points to a slug with no markdown file (hard reload may help if stubs were just regenerated).";
          // Don't update currentSlug or nav highlight — keep the previously loaded
          // state so the user doesn't lose their place.
          return;
        }
        const prevSlug = currentSlug;
        currentSlug = slug;
        currentFactId = null;

        // Reader-local breadcrumb history. Back navigation must not record the
        // page it just left, otherwise the stack collapses into a two-page loop.
        if (!opts.fromBreadcrumb && prevSlug && prevSlug !== slug) {
          const histIdx = pageHistory.findIndex(p => p.slug === slug);
          if (histIdx >= 0) {
            pageHistory = pageHistory.slice(0, histIdx);
          } else {
            const idx = await window.NepalExplorer.buildPageIndex();
            const title = idx.slugToTitle[prevSlug] || prevSlug;
            pageHistory.push({ slug: prevSlug, title });
          }
        }
        // Prepend breadcrumb
        if (pageHistory.length) {
          const prev = pageHistory[pageHistory.length - 1];
          page.innerHTML = `<a class="page-back" href="javascript:void(0)" onclick="window._breadcrumbBack && window._breadcrumbBack()">← ${escapeHtml(prev.title)}</a>` + page.innerHTML;
        }

        setActiveNav(slug);
        if (isCompactLayout()) setCompactView("readmap");
        // If a feature popup is currently open, refresh it so its CTA reflects the
        // new current page (e.g., the just-opened slug becomes "Already open").
        if (map) {
          map.eachLayer((lyr) => {
            if (lyr.isPopupOpen && lyr.isPopupOpen() && typeof lyr.getPopup === "function") {
              const p = lyr.getPopup();
              if (p) p.update();
            }
          });
        }

        const binding = bindings.pages[slug];
        if (!binding) {
          document.getElementById("map-info").innerHTML = "<b>" + slug + "</b><br/>Reader page · map stays on the current lens.";
          syncUrl();
          return;
        }

        // ADDITIVE: layers from the page binding are added on top of whatever
        // the active preset already has. The preset is preserved.
        const needed = (binding.layers_on || []).filter((k) => !lm.has(k));
        for (const k of needed) await lm.add(k);

        const onCount = lm.activeKeys().length;
        const featCount = (binding.features || []).length;
        document.getElementById("map-info").innerHTML =
          `<b>${slug}</b><br/>${featCount} feature(s) · ${onCount} layer(s) on${needed.length ? ` · added <i>${needed.join(", ")}</i>` : ""}.`;

        // If the page was already current, the user is just being routed back to
        // the same place — keep the camera put. Layers are already on; the bound
        // popup the click opened is enough feedback.
        if (wasAlreadyCurrent) {
          syncUrl();
          return;
        }

        setTimeout(async () => {
          const feats = lm.findFeaturesForSlug(slug, bindings);
          if (binding.focus && Array.isArray(binding.focus.bounds)) {
            map.flyToBounds(binding.focus.bounds, { padding: [40, 40], duration: 0.9, maxZoom: binding.focus.maxZoom || 9 });
            if (feats.length) lm.highlight(feats, { revertAfterMs: 4000 });
          } else if (binding.focus && Array.isArray(binding.focus.center)) {
            map.flyTo(binding.focus.center, binding.focus.zoom || 8, { duration: 0.9 });
            if (feats.length) lm.highlight(feats, { revertAfterMs: 4000 });
          } else if (feats.length) {
            const card = lm.pickCardFeature(feats);
            if (card) {
              // Direct hit: ensure the focal feature's layer is actually on the map,
              // then tight-zoom + pulse + flash card.
              if (!lm.has(card.key)) await lm.add(card.key);

              const single = L.featureGroup([card.layer]);
              const b = single.getBounds();
              if (b.isValid()) {
                map.flyToBounds(b, { padding: [80, 80], duration: 0.9, maxZoom: 12 });
              } else if (typeof card.layer.getLatLng === "function") {
                map.flyTo(card.layer.getLatLng(), 12, { duration: 0.9 });
              }
              lm.highlight([card], { revertAfterMs: 4500 });
              // Wait for the flyTo animation before opening the card so autoPan
              // doesn't fight the camera.
              setTimeout(() => {
                const spec = lm.buildCardSpec(card, { pageHref: `?page=${slug}` });
                if (spec) lm.flashCard(card, spec, { dismissAfterMs: 7000 });
              }, 950);
            } else {
              // Broad hit (basin polygon, multi-segment corridor): keep current behavior.
              lm.flyToFeatures(feats, { duration: 0.9, maxZoom: 9 });
              lm.highlight(feats, { revertAfterMs: 4000 });
            }
          } else if (binding.focus) {
            map.flyTo(binding.focus.center, binding.focus.zoom || 8, { duration: 0.9 });
          }
        }, 250);

        syncUrl();
      };

      window._breadcrumbBack = function () {
        if (!pageHistory.length) return;
        const prev = pageHistory.pop();
        window.openWikiPage(prev.slug, { fromBreadcrumb: true });
      };

      window.openFactDetail = async function (factId, opts = {}) {
        const fact = factIndex && factIndex.getFact(factId);
        if (!fact) return;
        currentFactId = factId;
        currentSlug = null;
        setActiveNav(null);
        document.getElementById("now-page").textContent = "project record";
        const page = document.getElementById("page");
        page.innerHTML = renderFactDetail(fact);
        if (isCompactLayout()) setCompactView("readmap");

        const ref = fact.feature_ref || {};
        if (ref.layer && !lm.has(ref.layer)) await lm.add(ref.layer);
        const feature = ref.layer ? lm.findFeatureByRef(ref) : null;
        document.getElementById("map-info").innerHTML =
          `<b>${escapeHtml(fact.name)}</b><br/>` +
          `<span class="muted">Project record · ${escapeHtml(fact.source_layer || "fact index")}</span>`;

        if (feature) {
          const single = L.featureGroup([feature.layer]);
          const b = single.getBounds();
          if (b.isValid()) {
            map.flyToBounds(b, { padding: [80, 80], duration: 0.9, maxZoom: 12 });
          } else if (typeof feature.layer.getLatLng === "function") {
            map.flyTo(feature.layer.getLatLng(), 12, { duration: 0.9 });
          }
          lm.highlight([feature], { revertAfterMs: 4500 });
          setTimeout(() => {
            const spec = lm.buildCardSpec(feature, { pageHref: `?fact=${encodeURIComponent(factId)}`, linkLabel: "Open project record →" });
            if (spec) lm.flashCard(feature, spec, { dismissAfterMs: 7000 });
          }, 950);
        }
        syncUrl();
      };

      function renderFactDetail(fact) {
        const rows = [
          ["Capacity", formatMw(fact.capacity_mw)],
          ["Status", fact.status_raw || fact.status],
          ["District", fact.district],
          ["River / basin", fact.river || fact.basin],
          ["Province", fact.province],
          ["Promoter / owner", fact.promoter],
          ["Source", fact.source_note || fact.source_layer],
        ].filter((row) => row[1]);
        const cells = rows.map(([label, value]) => `<div class="fact-cell"><b>${escapeHtml(label)}</b>${escapeHtml(value)}</div>`).join("");
        const related = (fact.related_slugs || []).map((slug) => {
          const page = pageMeta && pageMeta.bySlug && pageMeta.bySlug[slug];
          const title = page ? page.title : slug;
          return `<li><a href="javascript:void(0)" onclick="openWikiPage('${slug}')">${escapeHtml(title)}</a></li>`;
        }).join("");
        const wikiLink = fact.wiki_slug
          ? `<p><a href="javascript:void(0)" onclick="openWikiPage('${fact.wiki_slug}')">Open narrative wiki page →</a></p>`
          : `<p class="muted">Project record · no narrative wiki page yet.</p>`;
        return `<article class="page fact-page">
          <div class="fact-kicker">${escapeHtml(fact.domain || "fact")} project record</div>
          <h1>${escapeHtml(fact.name)}</h1>
          ${wikiLink}
          <div class="fact-grid">${cells}</div>
          ${related ? `<h2>Related wiki reading</h2><ul>${related}</ul>` : ""}
        </article>`;
      }

      function onFeatureClick({ key, props, slug, layer }) {
        if (slug) {
          const wasAlreadyCurrent = (currentSlug === slug);
          openWikiPage(slug);
          // When the click *triggers* navigation we close the popup — the reader is
          // the answer and a lingering "✓ Showing in reader" popup reads as a dead
          // handshake. When the page was already open (nav → map flyto → user clicks
          // the same marker for context) we keep the popup so the confirmatory CTA
          // is visible.
          if (!wasAlreadyCurrent) {
            setTimeout(() => {
              if (layer && typeof layer.closePopup === "function") layer.closePopup();
              map.closePopup();
            }, 20);
          }
          return;
        }
        const title = props.label_title || props.name || props.project || "(unnamed)";
        const info = [];
        const cap = props.capacity_mw != null ? `${props.capacity_mw} MW` : null;
        const stat = props.license_type || props.status || props.category || null;
        const river = props.river || props.basin || null;
        if (cap) info.push(cap);
        if (stat) info.push(stat);
        if (river) info.push(river);
        document.getElementById("map-info").innerHTML =
          `<b>${title}</b>` +
          (info.length ? ` <span class="muted">· ${info.join(" · ")}</span>` : "") +
          `<br/><span class="muted">Data-only · no narrative wiki page yet for this feature.</span>`;
      }

      // ============================================================
      // Presets (lenses) + layer panel + URL state
      // ============================================================
      function buildPresetBar() {
        const bar = document.getElementById("layer-preset-options");
        const legacyBar = document.getElementById("preset-bar");
        if (legacyBar) legacyBar.innerHTML = "";
        if (!bar) return;
        const order = Object.keys(presetsCfg.presets);
        let html = "";
        for (const key of order) {
          const p = presetsCfg.presets[key];
          html += `<button data-preset="${key}" title="${escapeAttr(p.label + ' — ' + (p.subtitle || p.description || ''))}">${p.short || p.label}</button>`;
        }
        bar.innerHTML = html;
        bar.querySelectorAll("button[data-preset]").forEach((b) => {
          b.addEventListener("click", () => applyPreset(b.dataset.preset, { fly: true }));
        });
        syncPresetUi(currentPreset);
      }

      function escapeAttr(s) {
        return String(s).replace(/[<>&"']/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;", "'": "&#39;" }[c]));
      }

      function presetDisplayName(p) {
        return p ? (p.short || p.label) : "";
      }

      async function applyPreset(key, opts = {}) {
        const p = presetsCfg.presets[key];
        if (!p) return;
        currentPreset = key;
        if (lm) lm.setPreset(key);
        syncPresetUi(key);
        const meta = document.getElementById("preset-meta");
        meta.classList.add("show");
        meta.innerHTML = `<b>${presetDisplayName(p)}</b> · ${p.subtitle || ""}`;
        setTimeout(() => meta.classList.remove("show"), 3500);

        await lm.setActive(p.layers_on || []);
        syncLayerControlPlaceholders();
        if (opts.fly !== false && p.bounds) {
          map.flyToBounds(p.bounds, { padding: [40, 40], duration: 0.9, maxZoom: 9 });
        }
        syncLayerPanel();
        syncUrl();
      }

      function syncPresetUi(key) {
        const p = key && presetsCfg && presetsCfg.presets ? presetsCfg.presets[key] : null;
        document.querySelectorAll("#layer-preset-options button[data-preset]").forEach((b) => {
          b.classList.toggle("active", b.dataset.preset === key);
        });
        const current = document.getElementById("layer-preset-current");
        if (current) {
          current.innerHTML = p
            ? escapeHtml(presetDisplayName(p))
            : "Choose a map lens";
        }
      }

      const LAYER_PANEL_SECTIONS = [
        {
          id: "basemap",
          title: "Basemap",
          mode: "base",
          rows: [
            { base: "Carto Positron", label: "Light", icon: "sun" },
            { base: "Topographic", label: "Terrain", icon: "terrain" },
            { base: "Satellite", label: "Satellite", icon: "satellite" },
          ],
        },
        {
          id: "basics",
          title: "Basics",
          rows: [
            { key: "basin_polygons", label: "Basin areas", symbol: "poly" },
            { key: "tributaries", label: "Nepal rivers", symbol: "river" },
            { special: "labels", label: "River name labels", symbol: "text" },
          ],
        },
        {
          id: "power",
          title: "Power Plants",
          rows: [
            { key: "hydropower_operating", label: "Hydro — operating", symbol: "live" },
            { key: "hydropower_construction", label: "Hydro — under construction", symbol: "build" },
            { key: "hydropower_survey", label: "Hydro — surveyed sites", symbol: "survey" },

      function syncLayerPanel() {
        const panel = document.getElementById("layer-panel");
        if (!panel || !panel.innerHTML) return;
        for (const row of panel.querySelectorAll(".lp-row")) {
          const base = row.dataset.base;
          const key = row.dataset.layer;
          const special = row.dataset.special;
          const on = base ? currentBaseLayer === base
            : special === "labels" ? !!(labelsLayer && map.hasLayer(labelsLayer))
              : special === "transmission_labels" ? !!(txLabelsLayer && map.hasLayer(txLabelsLayer))
                : key ? (lm.has(key) || lm.isManual(key))
                  : false;
          row.classList.toggle("on", on);
          const countEl = row.querySelector(".lp-count");
          if (countEl) {
            const spec = LAYER_PANEL_SECTIONS.flatMap((s) => s.isGroup ? (s.sections || []).flatMap((sub) => sub.rows || []) : (s.rows || [])).find((r) =>
              (base && r.base === base) || (key && r.key === key) || (special && r.special === special)
            );
            const count = spec ? layerCount(spec) : "";
            countEl.textContent = count;
            countEl.classList.toggle("empty", count === "");
          }
        }
      }

      function setBaseLayer(name) {
        if (!baseLayers || !baseLayers[name]) return;
        for (const layer of Object.values(baseLayers)) {
          if (map.hasLayer(layer)) map.removeLayer(layer);
        }
        baseLayers[name].addTo(map);
        currentBaseLayer = name;
        if (lm) lm.setBasemap(name);
        syncLayerPanel();
      }

      async function toggleManagedLayer(key) {
        if (!key || !manifest.layers[key]) return;
        if (lm.has(key) || lm.isManual(key)) lm.remove(key);
        else await lm.add(key, { manual: true });
        syncLayerControlPlaceholders();
        syncLayerPanel();
      }

      async function toggleSpecialLayer(which) {
        const layer = which === "labels" ? labelsLayer : txLabelsLayer;
        if (!layer) return;
        if (map.hasLayer(layer)) map.removeLayer(layer);
        else {
          await ensureSpecialLayerBuilt(layer);
          layer.addTo(map);
        }
        syncLayerControlPlaceholders();
        syncLayerPanel();
      }


      // Strip kV suffix and normalize whitespace/case so the same corridor matches across layers.
      function normalizeCorridorName(s) {
        return String(s || "")
          .toLowerCase()
          .replace(/\b\d+\s*kv\b/gi, "")
          .replace(/backbone|corridor|reinforcement/gi, "")
          .replace(/[^a-z0-9]+/g, " ")
          .trim();
      }

      // Render a small swatch mirroring a layer's own style — a filled dot for
      // points, a short stroke for lines, a filled square for polygons — so each
      // row in the layer control shows WHAT the thing looks like on the map.
      function layerSwatchHtml(def) {
        const s = def.style || {};
        if (def.kind === "point") {
          // Use a middling representative size so Operating vs Construction vs
          // Survey stay distinguishable in the control, without exploding row height.
          const rMax = s.radius_max || s.radius || 6;
          const sz = Math.min(Math.max(Math.round(rMax * 1.1), 5), 13);
          const fill = s.fillColor || s.color || "#666";
          const border = s.color || "#333";
          const fillOp = s.fillOpacity ?? 0.9;
          const weight = s.weight ?? 1.3;
          return `<span class="lc-swatch"><span class="lc-dot" style="width:${sz}px;height:${sz}px;background:${fill};border:${weight}px solid ${border};opacity:${fillOp};"></span></span>`;
        }
        if (def.kind === "line") {
          const color = s.color || "#666";
          const weight = Math.max(s.weight || 2, 1.5);
          const opacity = s.opacity ?? 0.9;
          const dashed = s.dashArray ? "background-image: repeating-linear-gradient(to right, currentColor 0 3px, transparent 3px 6px); color:" + color + ";" : "";
          return `<span class="lc-swatch"><span class="lc-line" style="${dashed || `background:${color};`}height:${weight}px;opacity:${opacity};"></span></span>`;
        }
        if (def.kind === "polygon") {
          const color = s.color || "#333";
          const fill = s.fillColor || color;
          const fillOp = s.fillOpacity ?? 0.2;
          return `<span class="lc-swatch"><span class="lc-poly" style="background:${fill};border:1.2px solid ${color};opacity:${Math.max(fillOp * 3, 0.55)};"></span></span>`;
        }
        return `<span class="lc-swatch lc-muted">·</span>`;
      }

      function layerHelpFor(key, def, fallbackName) {
        const name = def && def.label ? def.label : fallbackName;
        const entry = LAYER_HELP[key] || {};
        const source = def && def.path ? def.path.split("/").pop() : "";
        const kind = def && def.kind ? def.kind : "map";
        const summary = entry.summary || `${name} is a ${kind} layer${source ? ` from ${source}` : ""}.`;
        return {
          summary,
          wikiSlug: entry.wikiSlug || LAYER_WIKI_SLUG[key] || LAYER_HELP_PAGE,
          related: entry.related || [],
        };
      }

      function relatedTitles(slugs) {
        if (!Array.isArray(slugs) || !slugs.length) return "";
        const titles = (pageIndex && pageIndex.slugToTitle) || {};
        return slugs.map((slug) => titles[slug] || slug).join(" · ");
      }

      function overlayLabelHtml(def, fallbackName, opts = {}) {
        const name = def && def.label ? def.label : fallbackName;
        const sw = opts.swatch != null ? opts.swatch : (def ? layerSwatchHtml(def) : "");
        const group = opts.group ? ` data-lc-group="${opts.group}"` : "";
        const key = opts.key || fallbackName;
        const help = layerHelpFor(key, def, name);
        const helpAttrs = [
          `data-lc-key="${escapeAttr(key)}"`,
          `data-lc-summary="${escapeAttr(help.summary)}"`,
          `data-lc-wiki="${escapeAttr(help.wikiSlug || "")}"`,
          `data-lc-related="${escapeAttr(relatedTitles(help.related))}"`,
        ].join(" ");
        const count = opts.count
          ? `<span class="lc-count" title="features with a narrative wiki page / total">${opts.count.bound}/${opts.count.total}</span>`
          : "";
        return `<span class="lc-row"${group} ${helpAttrs}><span class="lc-main"><span class="lc-name">${escapeHtml(name)}</span>${count}</span>${sw}</span>`;
      }

      function installLayerControlHelp(root) {
        if (!root || root._npHelpInstalled) return;
        root._npHelpInstalled = true;
        let timer = null;
        let hideTimer = null;
        let activeRow = null;
        let tip = null;
        let pointerInRoot = false;
        let pointerInTip = false;

        function clearTimer() {
          if (timer) clearTimeout(timer);
          timer = null;
          if (hideTimer) clearTimeout(hideTimer);
          hideTimer = null;
        }

        function keepControlOpen() {
          if (!layerControl || typeof layerControl.expand !== "function") return;
          if (root.classList.contains("leaflet-control-layers-expanded")) return;
          const scrollTop = root.scrollTop;
          try { layerControl.expand(); } catch (e) { }
          root.scrollTop = scrollTop;
        }

        function maybeCollapseControl() {
          if (pointerInRoot || pointerInTip) return;
          if (layerControl && typeof layerControl.collapse === "function") {
            try { layerControl.collapse(); } catch (e) { }
          }
        }

        function hideTip() {
          clearTimer();
          activeRow = null;
          if (tip) {
            tip.remove();
            tip = null;
          }
          maybeCollapseControl();
        }

        function showTip(row) {
          if (!row || activeRow !== row) return;
          if (tip) tip.remove();
          const title = (row.querySelector(".lc-name") || row).textContent.trim();
          const summary = row.dataset.lcSummary || "";
          const related = row.dataset.lcRelated || "";
          const wikiSlug = row.dataset.lcWiki || "";
          tip = document.createElement("div");
          tip.className = "lc-help-tip";
          tip.innerHTML = `
      <div class="lc-help-title">${escapeHtml(title)}</div>
      <div>${escapeHtml(summary)}</div>
      ${related ? `<div class="lc-help-related">Related: ${escapeHtml(related)}</div>` : ""}
      ${wikiSlug ? `<div class="lc-help-actions"><button class="lc-help-open" type="button" data-lc-open="${escapeAttr(wikiSlug)}">Open</button></div>` : ""}
    `;
          tip.addEventListener("mouseenter", () => {
            pointerInTip = true;
            clearTimer();
            keepControlOpen();
          });
          tip.addEventListener("mouseleave", (e) => {
            pointerInTip = false;
            if (root.contains(e.relatedTarget)) {
              pointerInRoot = true;
              keepControlOpen();
              return;
            }
            hideTip();
          });
          tip.addEventListener("click", (e) => {
            const btn = e.target.closest(".lc-help-open");
            if (!btn) return;
            e.preventDefault();
            e.stopPropagation();
            const slug = btn.dataset.lcOpen;
            hideTip();
            if (slug && window.openWikiPage) window.openWikiPage(slug);
          });
          tip.style.visibility = "hidden";
          document.body.appendChild(tip);
          const rowRect = row.getBoundingClientRect();
          const tipRect = tip.getBoundingClientRect();
          let left = rowRect.left - tipRect.width - 10;
          if (left < 8) left = rowRect.right + 10;
          if (left + tipRect.width > window.innerWidth - 8) left = window.innerWidth - tipRect.width - 8;
          let top = rowRect.top;
          if (top + tipRect.height > window.innerHeight - 8) top = window.innerHeight - tipRect.height - 8;
          tip.style.left = `${Math.max(8, left)}px`;
          tip.style.top = `${Math.max(8, top)}px`;
          tip.style.visibility = "visible";
        }

        function schedule(row) {
          if (!row || activeRow === row) return;
          hideTip();
          activeRow = row;
          keepControlOpen();
          timer = setTimeout(() => showTip(row), 1050);
        }

        function leavingControlForTip(e) {
          return !!(tip && e.relatedTarget && tip.contains(e.relatedTarget));
        }

        // Leaflet collapses native layer controls when the mouse leaves the control.
        // Treat this custom explainer as part of the same hover region so the layer
        // panel does not close while the pointer is over the explainer.
        const holdOpenForTip = (e) => {
          if (!leavingControlForTip(e)) return;
          pointerInRoot = false;
          pointerInTip = true;
          keepControlOpen();
          e.stopImmediatePropagation();
        };
        root.addEventListener("mouseleave", holdOpenForTip, true);
        root.addEventListener("mouseout", holdOpenForTip, true);

        root.addEventListener("mouseenter", () => {
          pointerInRoot = true;
        });
        root.addEventListener("mouseleave", (e) => {
          pointerInRoot = false;
          if (leavingControlForTip(e)) return;
          hideTip();
        });
        root.addEventListener("mouseover", (e) => {
          pointerInRoot = true;
          const row = e.target.closest(".lc-row[data-lc-summary]");
          if (row && root.contains(row)) schedule(row);
        });
        root.addEventListener("scroll", () => {
          clearTimer();
          if (tip) {
            tip.remove();
            tip = null;
            activeRow = null;
          }
        }, { passive: true });
        root.addEventListener("mouseout", (e) => {
          if (!activeRow) return;
          if (activeRow.contains(e.relatedTarget)) return;
          if (tip && tip.contains(e.relatedTarget)) return;
          clearTimer();
          hideTimer = setTimeout(hideTip, 140);
        });
        root.addEventListener("focusin", (e) => {
          const row = e.target.closest(".lc-row[data-lc-summary]");
          if (row && root.contains(row)) schedule(row);
        });
        root.addEventListener("focusout", (e) => {
          if (!activeRow) return;
          setTimeout(() => {
            if (!root.contains(document.activeElement) && !(tip && tip.contains(document.activeElement))) hideTip();
          }, 0);
        });
      }

      function setLayerControlPlaceholder(key, on) {
        const placeholder = overlayPlaceholders[key];
        if (!placeholder || !map) return;
        syncingLayerControl = true;
        try {
          if (on && !map.hasLayer(placeholder)) placeholder.addTo(map);
          else if (!on && map.hasLayer(placeholder)) map.removeLayer(placeholder);
        } finally {
          syncingLayerControl = false;
        }
      }

      function syncLayerControlPlaceholders() {
        if (!layerControl || !map || !lm) return;
        const active = new Set(lm.activeKeys ? lm.activeKeys() : []);
        for (const key of Object.keys(overlayPlaceholders)) {
          const placeholder = overlayPlaceholders[key];
          if (placeholder._npSpecialKey) {
            const specialLayer = placeholder._npSpecialKey === "labels" ? labelsLayer : txLabelsLayer;
            setLayerControlPlaceholder(key, !!(specialLayer && map.hasLayer(specialLayer)));
          } else {
            setLayerControlPlaceholder(key, active.has(key));
          }
        }
      }

      async function ensureSpecialLayerBuilt(layer) {
        if (!layer || !layer._npRebuild || (layer._npLabels && layer._npLabels.built)) return;
        await layer._npRebuild();
      }

      // Build the native L.control.layers (basemaps + lazy overlay placeholders).
      async function buildLayerControl() {
        const baseLayerRows = {};
        const baseHelpKeys = {
          "Carto Positron": "base:carto",
          "Topographic": "base:topographic",
          "Satellite": "base:satellite",
        };
        for (const [name, layer] of Object.entries(baseLayers)) {
          baseLayerRows[overlayLabelHtml(null, name, {
            key: baseHelpKeys[name] || `base:${name.toLowerCase().replace(/[^a-z0-9]+/g, "-")}`,
            swatch: `<span class="lc-swatch lc-muted">Map</span>`,
          })] = layer;
        }

        // Use empty placeholders in the native Leaflet control. The real
        // GeoJSON is built only when a preset, custom panel row, or native
        // checkbox asks for that layer.
        const overlays = {};
        overlayPlaceholders = {};
        for (const key of Object.keys(manifest.layers)) {
          const def = manifest.layers[key];
          if (def.interactive === false) continue; // omit non-interactive base shapes (country outline) from the picker
          const group = key.startsWith("hydropower_") ? "hydropower" : null;
          const placeholder = L.layerGroup();
          placeholder._npLayerKey = key;
          overlayPlaceholders[key] = placeholder;
          overlays[overlayLabelHtml(def, key, { group })] = placeholder;
        }

        // River + basin labels — Folium-style permanent annotations
        labelsLayer = window.NepalExplorer.buildLabelsOverlay(lm, manifest, manifest.labels_overlay || []);
        const labelsPlaceholder = L.layerGroup();
        labelsPlaceholder._npSpecialKey = "labels";
        overlayPlaceholders.__labels = labelsPlaceholder;
        overlays[overlayLabelHtml(null, "Labels", { key: "labels", swatch: `<span class="lc-swatch lc-muted">Aa</span>` })] = labelsPlaceholder;

        // Transmission labels — separate toggle so they don't compete with river labels at low zoom.
        // Labels come only from the public connected network. QA/source layers stay unlabeled.
        const txSpecs = (manifest.transmission_labels_overlay || []).map((s) => ({
          ...s,
          format: (p) => {
            const nm = p.name || p.short_label || p.corridor_id || "";
            if (!nm) return "";
            return p.voltage_kv ? `${nm} · ${p.voltage_kv} kV` : nm;
          },
        }));
        txLabelsLayer = window.NepalExplorer.buildLabelsOverlay(lm, manifest, txSpecs);
        const txLabelsPlaceholder = L.layerGroup();
        txLabelsPlaceholder._npSpecialKey = "transmission_labels";
        overlayPlaceholders.__transmission_labels = txLabelsPlaceholder;
        overlays[overlayLabelHtml(null, "Transmission labels", { key: "transmission_labels", swatch: `<span class="lc-swatch lc-muted">Aa</span>` })] = txLabelsPlaceholder;

        layerControl = L.control.layers(baseLayerRows, overlays, {
          position: "topright",
          collapsed: true,        // collapsed by default (Folium-style) — expands on hover
          hideSingleBase: false,
          autoZIndex: true,
        }).addTo(map);
        installLayerControlHelp(layerControl.getContainer());
        map.on("overlayadd", async (e) => {
          if (syncingLayerControl) return;
          const key = e.layer && e.layer._npLayerKey;
          const special = e.layer && e.layer._npSpecialKey;
          if (key) {
            await lm.add(key, { manual: true });
            syncLayerPanel();
            syncLayerControlPlaceholders();
          } else if (special) {
            const layer = special === "labels" ? labelsLayer : txLabelsLayer;
            await ensureSpecialLayerBuilt(layer);
            if (layer && !map.hasLayer(layer)) layer.addTo(map);
            syncLayerPanel();
            syncLayerControlPlaceholders();
          }
        });
        map.on("overlayremove", (e) => {
          if (syncingLayerControl) return;
          const key = e.layer && e.layer._npLayerKey;
          const special = e.layer && e.layer._npSpecialKey;
          if (key) {
            lm.remove(key);
            syncLayerPanel();
          } else if (special) {
            const layer = special === "labels" ? labelsLayer : txLabelsLayer;
            if (layer && map.hasLayer(layer)) map.removeLayer(layer);
            syncLayerPanel();
          }
        });

        // Sync pass: (1) mark each row .lc-on iff its checkbox is checked so the
        // swatch only appears for active layers, and (2) show the size-encoding
        // footer only when at least one hydropower_* layer is active. Leaflet
        // rebuilds the inner DOM on every overlay toggle, so we also ensure the
        // footer element exists before each pass.
        const syncSwatches = () => {
          const root = layerControl.getContainer();
          const overlaysHost = root.querySelector(".leaflet-control-layers-overlays");
          if (!overlaysHost) return;
          let foot = overlaysHost.querySelector(".lc-foot");
          if (!foot) {
            foot = document.createElement("div");
            foot.className = "lc-foot";
            foot.innerHTML = `
        <div class="lc-tierseg" role="group" aria-label="Filter markers by wiki-page tier">
          <button data-tier="all"       title="Show every marker">All</button>
          <button data-tier="bound"     title="Hide data-only markers and keep pages with wiki records">Wiki pages</button>
          <button data-tier="narrated"  title="Show only pages with public narrative context">Narrative</button>
        </div>
        <div class="lc-dotcap" style="margin-top:6px; line-height:1.5">
          <div>Dot size ∝ √capacity (MW)</div>
          <div style="margin-top:3px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
            <span title="Page with public narrative context"><span class="lc-legend-dot lc-legend-narrated"></span> narrative</span>
            <span title="Registry-backed project record"><span class="lc-legend-dot lc-legend-stub"></span> project record</span>
            <span title="No wiki page"><span class="lc-legend-dot lc-legend-orphan"></span> data only</span>
          </div>
        </div>
      `;
            overlaysHost.appendChild(foot);
            foot.querySelectorAll(".lc-tierseg button").forEach((btn) => {
              btn.addEventListener("click", () => setMarkerTier(btn.dataset.tier));
            });
          }
          // Reflect current tier on every rebuild (Leaflet wipes the inner DOM on toggle).
          const tier = document.body.dataset.npTier || "all";
          foot.querySelectorAll(".lc-tierseg button").forEach((btn) => {
            btn.classList.toggle("active", btn.dataset.tier === tier);
          });
          let hpActive = false;
          overlaysHost.querySelectorAll("label").forEach((lbl) => {
            const input = lbl.querySelector('input[type="checkbox"]');
            const row = lbl.querySelector(".lc-row");
            if (!input || !row) return;
            const on = input.checked;
            row.classList.toggle("lc-on", on);
            if (on && row.dataset.lcGroup === "hydropower") hpActive = true;
          });
          foot.classList.toggle("lc-foot-on", hpActive);
        };
        // Tier filter — one of { "all", "bound", "narrated" }, persisted across reloads.
        // Also migrates the old boolean preference (explorer.onlyBound === "1") to the
        // new three-way key so existing users don't lose their setting.
        window.setMarkerTier = function (tier) {
          if (!["all", "bound", "narrated"].includes(tier)) tier = "all";
          document.body.dataset.npTier = tier;
          document.body.classList.toggle("np-only-bound", tier === "bound" || tier === "narrated");
          document.body.classList.toggle("np-only-narrated", tier === "narrated");
          localStorage.setItem("explorer.markerTier", tier);
          document.querySelectorAll(".leaflet-control-layers .lc-tierseg button").forEach((b) => {
            b.classList.toggle("active", b.dataset.tier === tier);
          });
          renderTierBanner();
        };
        // Shows a dismissible banner over the map whenever the tier filter is
        // hiding markers. Without this, a user who set "Narrated" in one session
        // opens a fresh tab and silently sees almost no markers — which reads as
        // "bug". The banner makes the filter state loud and reversible.
        function renderTierBanner() {
          const tier = document.body.dataset.npTier || "all";
          const mapEl = document.getElementById("map");
          if (!mapEl) return;
          let banner = document.getElementById("tier-banner");
          if (tier === "all") {
            if (banner) banner.remove();
            return;
          }
          const label = tier === "narrated"
            ? "Showing narrative pages only — project records &amp; data-only markers hidden."
            : "Showing wiki-bound markers only — data-only markers hidden.";
          if (!banner) {
            banner = document.createElement("div");
            banner.id = "tier-banner";
            banner.className = "np-tier-banner";
            mapEl.appendChild(banner);
          }
          banner.innerHTML = `
      <span class="tb-msg">${label}</span>
      <button class="tb-btn" type="button" onclick="window.setMarkerTier('all')">Show all</button>
    `;
        }
        (function restoreTier() {
          let saved = localStorage.getItem("explorer.markerTier");
          if (!saved) {
            saved = localStorage.getItem("explorer.onlyBound") === "1" ? "bound" : "all";
          }
          window.setMarkerTier(saved);
        })();
        syncSwatches();
        // Leaflet's _update rebuilds rows on every add/remove; MutationObserver
        // covers that. overlayadd/overlayremove cover toggles triggered outside
        // the control (presets, deep links).
        new MutationObserver(syncSwatches).observe(
          layerControl.getContainer().querySelector(".leaflet-control-layers-list"),
          { childList: true, subtree: true }
        );
        map.on("overlayadd overlayremove", syncSwatches);
      }

      function syncUrl() {
        if (suppressUrlSync) return;
        const params = new URLSearchParams();
        if (currentPreset) params.set("preset", currentPreset);
        if (currentFactId) params.set("fact", currentFactId);
        else if (currentSlug) params.set("page", currentSlug);
        if (tourState.enabled) params.set("guided", "1");
        if (tourState.enabled && tourState.active && tourState.tourId) {
          params.set("tour", tourState.tourId);
          params.set("mode", tourState.mode);
          const step = activeTourStep();
          if (step && step.id) params.set("step", step.id);
        }
        const url = params.toString() ? "?" + params.toString() : location.pathname;
        history.replaceState(null, "", url);
      }

      function readUrlState() {
        const params = new URLSearchParams(location.search);
        return {
          preset: params.get("preset"),
          page: params.get("page"),
          fact: params.get("fact"),
          guided: params.get("guided"),
          tour: params.get("tour"),
          mode: params.get("mode"),
          step: params.get("step"),
        };
      }

      // ============================================================
      // Init
      // ============================================================
      async function init() {
        const [
          manifestData,
          bindingsData,
          presetsData,
          tourData,
          aliasesData,
          pageIndexData,
          pageMetaData,
          searchData,
          factData,
        ] = await Promise.all([
          loadJSON("shared/layer-manifest.json"),
          loadJSON("shared/bindings.json"),
          loadJSON("shared/presets.json"),
          loadJSON("shared/tour-manifest.json"),
          loadJSON("shared/hydropower-slug-aliases.json"),
          window.NepalExplorer.buildPageIndex(),
          loadJSON("shared/wiki-page-meta.json"),
          loadJSON("shared/wiki-search-index.json"),
          loadJSON("shared/wiki-fact-index.json"),
        ]);
        manifest = manifestData;
        bindings = bindingsData;
        presetsCfg = presetsData;
        tourManifest = tourData;
        hydropowerSlugAliases = aliasesData;
        pageIndex = pageIndexData;
        spatialSlugs = new Set(Object.keys(bindings.pages || {}));
        pageMeta = pageMetaData;
        pageMeta.bySlug = Object.fromEntries(pageMeta.pages.map((p) => [p.slug, p]));
        searchIndex = new window.NepalExplorer.StaticSearchIndex(searchData);
        factIndex = new window.NepalExplorer.StaticFactIndex(factData, searchIndex);
        vectorBoost = null;
        const loadVectorBoost = async () => {
          if (vectorBoost) return;
          try {
            vectorBoost = new window.NepalExplorer.VectorSeekBoost(await loadJSON("shared/wiki-vector-index.json"), {
              onStatus: (s) => showSeekStatus(s.state, s.message),
            });
          } catch (err) {
            vectorBoost = null;
          }
        };
        const scheduleVectorBoost = () => {
          if ("requestIdleCallback" in window) window.requestIdleCallback(loadVectorBoost, { timeout: 4000 });
          else setTimeout(loadVectorBoost, 1500);
        };

        setupSplitters();
        setupCompactShell();

        document.querySelectorAll("#search-mode button").forEach((b) => {
          b.addEventListener("click", () => setSearchMode(b.dataset.mode));
        });
        document.querySelectorAll("#seek-suggestions button").forEach((b) => {
          b.addEventListener("click", () => {
            setSearchMode("seek");
            document.getElementById("q").value = b.dataset.query || "";
            applySearch();
            document.getElementById("q").focus();
          });
        });
        document.getElementById("q").addEventListener("input", applySearch);
        document.getElementById("clear-q").addEventListener("click", () => {
          document.getElementById("q").value = "";
          applySearch();
          document.getElementById("q").focus();
        });
        const toggleTourMode = () => {
          tourState.enabled = !tourState.enabled;
          localStorage.setItem("explorer.guidedEnabled", tourState.enabled ? "1" : "0");
          applyTourEnabledState();
          if (tourState.enabled) startTour(tourState.tourId, tourState.mode);
        };
        const tourModeToggle = document.getElementById("tour-mode-toggle");
        tourModeToggle.addEventListener("click", toggleTourMode);
        tourModeToggle.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            toggleTourMode();
          }
        });

        setSearchMode(searchMode);

        ({ map, baseLayers } = makeMap("map"));
        const reverseIdx = buildReverseIndex(bindings);
        const pagesWithImages = new Set(
          (pageMeta.pages || []).filter((p) => (p.image_count || 0) > 0).map((p) => p.slug)
        );
        const stubSlugs = new Set(
          (pageMeta.pages || []).filter((p) => p.is_stub).map((p) => p.slug)
        );
        lm = new LayerManager(map, manifest, reverseIdx, {
          onFeatureClick,
          getCurrentSlug: () => currentSlug,
          pagesWithImages,
          stubSlugs,
          hydropowerSlugAliases,
          knownSlugs: new Set(pageIndex.allSlugs || []),
          preset: currentPreset,
          basemap: currentBaseLayer,
        });
        lm.setMarkerMode("badges");
        lm.setBasemap(currentBaseLayer);

        // Zoom-aware label visibility — only simplify at national zoom.
        // Never force-add labels; that would override explicit user toggles.
        map.on("zoomend", () => {
          const behavior = NepalExplorer.getZoomBehavior(map.getZoom());
          if (labelsLayer && behavior === "national" && map.hasLayer(labelsLayer)) {
            map.removeLayer(labelsLayer);
          }
          if (txLabelsLayer && behavior === "national" && map.hasLayer(txLabelsLayer)) {
            map.removeLayer(txLabelsLayer);
          }
          syncLayerPanel();
        });

        // Country outline is non-interactive and not in the layer picker;
        // it just sits behind everything.
        await lm.add("country_outline");

        await buildLayerControl();
        layerFeatureCounts = Object.fromEntries(
          Object.keys(manifest.layers).map((key) => {
            const layer = lm.layers[key];
            const count = layer && typeof layer.getLayers === "function" ? layer.getLayers().length : "";
            return [key, count];
          })
        );
        buildLayerPanel();
        document.addEventListener("mousedown", (e) => {
          const panel = document.getElementById("layer-panel");
          const pinned = localStorage.getItem("explorer.panelPinned") === "1";
          if (!pinned && panel && !panel.classList.contains("collapsed") && !panel.contains(e.target)) {
            panel.classList.add("collapsed");
            localStorage.setItem("explorer.layerPanelCollapsed", "1");
          }
        });
        map.on("overlayadd overlayremove", syncLayerPanel);
        buildPresetBar();

        // Resolve initial state: URL > localStorage > config default
        const url = readUrlState();
        setCompactView(initialCompactView(url), { persist: false });
        tourState.enabled = (url.guided === "1") || (localStorage.getItem("explorer.guidedEnabled") === "1");
        tourState.tourId = url.tour || localStorage.getItem("explorer.tour") || tourManifest.default_tour || Object.keys(tourManifest.tours || {})[0] || null;
        tourState.mode = (tourManifest.modes && tourManifest.modes[url.mode]) ? url.mode : (localStorage.getItem("explorer.tourMode") || tourManifest.default_mode || "short");
        const savedPreset = localStorage.getItem("explorer.preset");
        const initialPreset = url.preset || savedPreset || presetsCfg.default_preset;

        suppressUrlSync = true;
        await applyPreset(initialPreset in presetsCfg.presets ? initialPreset : presetsCfg.default_preset, { fly: !url.page && !url.fact });
        suppressUrlSync = false;

        if (url.fact && factIndex.getFact(url.fact)) {
          await window.openFactDetail(url.fact);
        } else if (url.page && pageIndex.slugToCategory[url.page]) {
          await window.openWikiPage(url.page);
        } else if (pageIndex.slugToCategory[DEFAULT_PAGE]) {
          await window.openWikiPage(DEFAULT_PAGE);
        } else {
          syncUrl();
        }
        applyTourEnabledState();
        if (tourState.enabled && url.tour && tourManifest.tours[url.tour]) {
          startTour(url.tour, tourState.mode, url.step || null);
        }

        // Persist preset choice
        const _origApply = applyPreset;
        // (already runs syncUrl; also store preference)
        window.addEventListener("beforeunload", () => {
          if (currentPreset) localStorage.setItem("explorer.preset", currentPreset);
        });

        window._explorer = { lm, map, baseLayers, openWikiPage, setSearchMode, buildNav, applyPreset, presetsCfg, setCompactView };
        syncLayerPanel();
        scheduleVectorBoost();

        // --- Wiki-page image lightbox -------------------------------------------
        // The wiki renderer embeds a <script type="application/json"> payload with
        // the page's images; we read it each time the lightbox opens so the handler
        // doesn't need its own state synchronization with page navigation.
        const lb = document.getElementById("wiki-lightbox");
        const lbImg = document.getElementById("wiki-lightbox-img");
        const lbCap = document.getElementById("wiki-lightbox-caption");
        const lbCred = document.getElementById("wiki-lightbox-credit");
        const lbPrev = document.getElementById("wiki-lightbox-prev");
        const lbNext = document.getElementById("wiki-lightbox-next");
        const lbClose = document.getElementById("wiki-lightbox-close");
        const lbStage = document.getElementById("wiki-lightbox-stage");
        const lbZoomOut = document.getElementById("wiki-lightbox-zoom-out");
        const lbZoomIn = document.getElementById("wiki-lightbox-zoom-in");
        const lbZoomReset = document.getElementById("wiki-lightbox-zoom-reset");
        let lbImages = []; let lbIndex = 0; let lbZoom = 1;
        const LB_ZOOM_MIN = 0.75;
        const LB_ZOOM_MAX = 4;
        const LB_ZOOM_STEP = 0.25;

        function readImageData() {
          const el = document.getElementById("wiki-images-data");
          if (!el) return [];
          try { return JSON.parse(el.textContent); } catch { return []; }
        }
        function readInlineFigureData() {
          return Array.from(document.querySelectorAll("#page .wiki-inline-figure")).map((fig) => {
            const img = fig.querySelector("img");
            const cap = fig.querySelector("figcaption");
            if (!img) return null;
            return {
              src: img.getAttribute("src") || img.src,
              caption: cap ? cap.textContent.trim() : (img.alt || ""),
              credit: "",
              license: "",
            };
          }).filter(Boolean);
        }
        function normalizeLightboxItems(items) {
          return (items || []).map((img) => ({
            src: String(img.src || ""),
            caption: img.caption || "",
            credit: img.credit || "",
            license: img.license || "",
          })).filter((img) => img.src);
        }
        function resolveLightboxSrc(src) {
          if (/^(https?:)?\/\//.test(src) || src.startsWith("data:")) return src;
          if (src.startsWith("../assets/images/")) return src;
          return `../assets/images/${src}`;
        }
        function applyLightboxZoom() {
          const pct = Math.round(lbZoom * 100);
          lbImg.style.maxWidth = `${pct}%`;
          lbImg.style.maxHeight = `${Math.round(lbZoom * 78)}vh`;
          lbZoomReset.textContent = `${pct}%`;
          lbZoomOut.disabled = lbZoom <= LB_ZOOM_MIN;
          lbZoomIn.disabled = lbZoom >= LB_ZOOM_MAX;
        }
        function setLightboxZoom(nextZoom) {
          lbZoom = Math.max(LB_ZOOM_MIN, Math.min(LB_ZOOM_MAX, Math.round(nextZoom * 100) / 100));
          applyLightboxZoom();
        }
        function renderLightboxAt(i) {
          if (!lbImages.length) return;
          lbIndex = (i + lbImages.length) % lbImages.length;
          const img = lbImages[lbIndex];
          lbImg.src = resolveLightboxSrc(img.src);
          lbImg.alt = img.caption || "";
          lbCap.textContent = img.caption || "";
          lbCred.textContent = [img.credit, img.license].filter(Boolean).join(" · ");
          lbPrev.disabled = lbImages.length <= 1;
          lbNext.disabled = lbImages.length <= 1;
          lbStage.scrollTop = 0;
          lbStage.scrollLeft = 0;
          setLightboxZoom(1);
        }
        window.openWikiLightbox = function (index, opts = {}) {
          const items = opts.items ? normalizeLightboxItems(opts.items) : normalizeLightboxItems(readImageData());
          lbImages = items;
          if (!lbImages.length) return;
          renderLightboxAt(index || 0);
          lb.classList.add("open");
          lb.setAttribute("aria-hidden", "false");
        };
        function closeLightbox() {
          lb.classList.remove("open");
          lb.setAttribute("aria-hidden", "true");
          lbImg.src = "";
        }
        lbClose.addEventListener("click", closeLightbox);
        lb.addEventListener("click", (e) => { if (e.target === lb) closeLightbox(); });
        lbPrev.addEventListener("click", () => renderLightboxAt(lbIndex - 1));
        lbNext.addEventListener("click", () => renderLightboxAt(lbIndex + 1));
        lbZoomOut.addEventListener("click", () => setLightboxZoom(lbZoom - LB_ZOOM_STEP));
        lbZoomIn.addEventListener("click", () => setLightboxZoom(lbZoom + LB_ZOOM_STEP));
        lbZoomReset.addEventListener("click", () => setLightboxZoom(1));
        document.addEventListener("click", (e) => {
          const fig = e.target.closest("#page .wiki-inline-figure");
          if (!fig) return;
          const figures = Array.from(document.querySelectorAll("#page .wiki-inline-figure"));
          const index = figures.indexOf(fig);
          if (index === -1) return;
          const items = readInlineFigureData();
          if (!items.length) return;
          window.openWikiLightbox(index, { items });
        });
        lbStage.addEventListener("wheel", (e) => {
          if (!lb.classList.contains("open")) return;
          e.preventDefault();
          const delta = e.deltaY < 0 ? LB_ZOOM_STEP : -LB_ZOOM_STEP;
          setLightboxZoom(lbZoom + delta);
        }, { passive: false });
        document.addEventListener("keydown", (e) => {
          if (!lb.classList.contains("open")) return;
          if (e.key === "Escape") closeLightbox();
          else if (e.key === "ArrowLeft") renderLightboxAt(lbIndex - 1);
          else if (e.key === "ArrowRight") renderLightboxAt(lbIndex + 1);
          else if (e.key === "+" || e.key === "=") setLightboxZoom(lbZoom + LB_ZOOM_STEP);
          else if (e.key === "-") setLightboxZoom(lbZoom - LB_ZOOM_STEP);
          else if (e.key === "0") setLightboxZoom(1);
        });
      }
      init();
    })();
  </script>

</body>

</html>
